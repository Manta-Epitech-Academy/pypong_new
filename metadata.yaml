# yaml-language-server: $schema=https://raw.githubusercontent.com/kevin-cazal/workshop-metadata-tools/main/metadata.schema.json
schema_version: "1.4"

project:
  name: "PyPong"
  slug: "pypong"
  summary: "Créez votre propre jeu Pong simplifié en Python avec TIC-80 !"
  entrypoint: "intro.md"

runtime:
  engine: "TIC-80"
  language: "python"

documents:
  - path: "intro.md"
  - path: "pypong.md"

toc:
